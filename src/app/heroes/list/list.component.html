<h3>Listado de Tonotos</h3>

@if (deletedHero) {
  <div>
    <h3>Tonoto borrado <small class="text-danger">{{deletedHero}}</small></h3>
  </div>
} @else {
  <h3>No ha borrado nada.</h3>
}


@if (heroNames.length > 0) {
  <button
    (click)="removeLastHero()"
    class="btn btn-outline-danger">
    Borrar último tonoto
  </button>
}

<ul class="mt-2 list-group">
  @for (name of heroNames; track name) {
    <li class="list-group-item">{{name}}
    </li>
  }
</ul>
